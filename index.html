<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intervalltränare</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="setupView">
        <h1 id="titleSetup">🎵 Intervalltränare</h1>

        <section class="controls">
          <label>
            <span id="labelLanguageSetup">Språk</span>
            <select id="languageSetup">
              <option value="sv" selected>Svenska</option>
              <option value="en">English</option>
            </select>
          </label>

          <label>
            <span id="labelInstrumentSetup">Ljud (inställning)</span>
            <select id="instrument">
              <option value="triangle" selected></option>
              <option value="sine"></option>
              <option value="square"></option>
              <option value="sawtooth"></option>
              <option value="flute"></option>
              <option value="organ"></option>
              <option value="bell"></option>
              <option value="warmpad"></option>
            </select>
          </label>

          <label>
            <span id="labelDirectionSetup">Melodiriktning</span>
            <select id="directionSetup">
              <option value="up"></option>
              <option value="down"></option>
              <option value="both" selected></option>
            </select>
          </label>

          <label>
            <span id="labelRootSetup">Grundton</span>
            <select id="rootModeSetup">
              <option value="chromatic" selected></option>
              <option value="c"></option>
            </select>
          </label>
        </section>

        <section class="interval-picker">
          <p id="intervalPickerText">Välj intervall som ska vara med:</p>
          <div id="intervalCheckboxes" class="checkbox-grid"></div>
        </section>

        <button id="startGame">Starta spelet</button>
      </section>

      <section id="gameView" class="hidden">
        <h1 id="titleGame">🎵 Intervalltränare</h1>

        <section class="controls">
          <label>
            <span id="labelLanguageGame">Språk</span>
            <select id="languageGame">
              <option value="sv" selected>Svenska</option>
              <option value="en">English</option>
            </select>
          </label>

          <label>
            <span id="labelInstrumentGame">Ljud</span>
            <select id="instrumentGame"></select>
            <small id="soundInfo" class="muted"></small>
          </label>

          <label>
            <span id="labelDirectionGame">Melodiriktning</span>
            <select id="directionGame">
              <option value="up"></option>
              <option value="down"></option>
              <option value="both"></option>
            </select>
          </label>

          <label>
            <span id="labelRootGame">Grundton</span>
            <select id="rootModeGame">
              <option value="chromatic"></option>
              <option value="c"></option>
            </select>
          </label>
        </section>

        <section class="actions">
          <button id="playMelodic" disabled>Spela melodi</button>
          <button id="playHarmonic" disabled>Spela harmoni</button>
        </section>

        <section>
          <p id="status">Starta en runda för att börja.</p>
        </section>

        <section class="answers" id="answers"></section>

        <section class="round-cta">
          <button id="nextRound">Nästa runda</button>
        </section>

        <section class="scoreboard">
          <div><span id="scoreLabel">Poäng</span>: <span id="score">0</span></div>
          <div><span id="streakLabel">Streak</span>: <span id="streak">0</span></div>
          <div><span id="accuracyLabel">Rätt av rundor</span>: <span id="accuracy">0/0</span></div>
          <button id="exitGame" class="ghost">Avsluta</button>
        </section>
      </section>
    </main>

    <script src="script.js?v=20260310-14"></script>
  </body>
</html>
