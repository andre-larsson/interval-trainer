<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intervalltränare</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="setupView">
        <h1>🎵 Intervalltränare</h1>
        <p class="subtitle">Öva gehör med tydliga rundor och fokus på rätt svar.</p>

        <section class="controls">
          <label>
            Ljud (inställning)
            <select id="instrument">
              <option value="sine">Ren ton (sine)</option>
              <option value="triangle" selected>Mjuk synth (triangle)</option>
              <option value="square">Klar synth (square)</option>
              <option value="sawtooth">Bright synth (sawtooth)</option>
            </select>
          </label>
        </section>

        <section class="interval-picker">
          <p>Välj intervall som ska vara med:</p>
          <div id="intervalCheckboxes" class="checkbox-grid"></div>
        </section>

        <button id="startGame">Starta spelet</button>
      </section>

      <section id="gameView" class="hidden">
        <h1>🎵 Intervalltränare</h1>

        <section class="actions">
          <button id="nextRound">Starta första runda</button>
          <button id="playMelodic" disabled>Spela melodi</button>
          <button id="playHarmonic" disabled>Spela harmoni</button>
        </section>

        <section>
          <p id="status">Starta en runda för att börja.</p>
        </section>

        <section class="answers" id="answers"></section>

        <section class="scoreboard">
          <div>Poäng: <span id="score">0</span></div>
          <div>Streak: <span id="streak">0</span></div>
          <button id="resetScore" class="ghost">Nollställ</button>
          <button id="exitGame" class="ghost">Avsluta</button>
        </section>
      </section>
    </main>

    <script src="script.js?v=20260310-1"></script>
  </body>
</html>
