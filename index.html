<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intervalltränare</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section id="setupView">
        <h1>🎵 Intervalltränare</h1>
        <p class="subtitle">Öva gehör med tydliga rundor och fokus på rätt svar.</p>

        <section class="controls">
          <label>
            Ljud (inställning)
            <select id="instrument">
              <option value="triangle" selected>Mjuk synth</option>
              <option value="sine">Ren ton</option>
              <option value="square">Klar synth</option>
              <option value="sawtooth">Bright synth</option>
              <option value="flute">Flöjt</option>
              <option value="organ">Orgel</option>
              <option value="bell">Klocka</option>
              <option value="warmpad">Varm pad</option>
            </select>
          </label>

          <label>
            Melodiriktning
            <select id="directionSetup">
              <option value="up">Uppåt</option>
              <option value="down">Nedåt</option>
              <option value="both" selected>Båda (slump)</option>
            </select>
          </label>
        </section>

        <section class="interval-picker">
          <p>Välj intervall som ska vara med:</p>
          <div id="intervalCheckboxes" class="checkbox-grid"></div>
        </section>

        <button id="startGame">Starta spelet</button>
      </section>

      <section id="gameView" class="hidden">
        <h1>🎵 Intervalltränare</h1>

        <section class="controls">
          <label>
            Ljud
            <select id="instrumentGame"></select>
          </label>

          <label>
            Melodiriktning
            <select id="directionGame">
              <option value="up">Uppåt</option>
              <option value="down">Nedåt</option>
              <option value="both">Båda (slump)</option>
            </select>
          </label>
        </section>

        <section class="actions">
          <button id="playMelodic" disabled>Spela melodi</button>
          <button id="playHarmonic" disabled>Spela harmoni</button>
        </section>

        <section>
          <p id="status">Starta en runda för att börja.</p>
        </section>

        <section class="answers" id="answers"></section>

        <section class="round-cta">
          <button id="nextRound">Nästa runda (låst tills rätt svar)</button>
        </section>

        <section class="scoreboard">
          <div>Poäng: <span id="score">0</span></div>
          <div>Streak: <span id="streak">0</span></div>
          <div>Rätt av rundor: <span id="accuracy">0/0</span></div>
          <button id="exitGame" class="ghost">Avsluta</button>
        </section>
      </section>
    </main>

    <script src="script.js?v=20260310-5"></script>
  </body>
</html>
